name: CI

on:
  push:
    branches:
      - "main"
      - "feature/*"
      - "integration/*"
      - "fix/*"
    branches-ignore:
      - "chore/*"
  pull_request:
    branches: [ "main" ]
    types: [ "opened", "reopened", "synchronize" ]

jobs:
  set-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK pro checkiuyt
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

  build:
    runs-on: ubuntu-latest
    needs: set-up
    steps:
      - uses: actions/checkout@v4
      - name: Build aplicação
        run: ./mvnw -B -DskipTests clean package

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK para testes
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Rodar testes (Dev Services)
        run: ./mvnw -B verify -Dquarkus.test.continuous-testing=disabled

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK para deploy
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Login no Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Buildar e Push da imagem com Jib
        run: |
          ./mvnw package \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -Dquarkus.container-image.image=docker.io/${{ secrets.DOCKER_USERNAME }}/quarkus-bitcoin:latest

  scan-docker-image:
     runs-on: ubuntu-latest
     needs: deploy
     steps:
       - name: Scan Docker Image com Trivy
         uses: aquasecurity/trivy-action@0.24.0
         with:
            image-ref: docker.io/${{ secrets.DOCKER_USERNAME }}/quarkus-bitcoin:latest
            format: table
            exit-code: 1
            ignore-unfixed: true
            severity: CRITICAL,HIGH
      
       - name: Scan dependências Maven
         uses: aquasecurity/trivy-action@0.24.0
         with:
            scan-type: fs
            format: table
           
